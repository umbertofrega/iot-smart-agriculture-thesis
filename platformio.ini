[env:arduino_nano_esp32]
platform = espressif32
board = arduino_nano_esp32
framework = arduino
monitor_speed = 115200
lib_deps = 
	knolleary/PubSubClient @ ^2.8.0
	bblanchon/ArduinoJson@^7.2.2
	milesburton/DallasTemperature@^4.0.6
